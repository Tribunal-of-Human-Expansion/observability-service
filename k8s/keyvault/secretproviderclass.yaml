apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: observability-kv-secrets
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: "REPLACE_WITH_WORKLOAD_IDENTITY_CLIENT_ID"
    keyvaultName: "REPLACE_WITH_KEY_VAULT_NAME"
    tenantId: "REPLACE_WITH_AZURE_TENANT_ID"
    objects: |
      array:
        - |
          objectName: db-username
          objectType: secret
        - |
          objectName: db-password
          objectType: secret
  secretObjects:
    - secretName: observability-kv-synced
      type: Opaque
      data:
        - objectName: db-username
          key: DB_USERNAME
        - objectName: db-password
          key: DB_PASSWORD
