apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: observability-kv-secrets
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: "ffbb5ff4-406a-494f-8de9-9776e768f1ed"
    keyvaultName: "ds-gtbs-kv-prod"
    tenantId: "d595be8d-b306-45f4-8064-9e5b82fbe52b"
    objects: |
      array:
        - |
          objectName: db-username
          objectType: secret
        - |
          objectName: db-password
          objectType: secret
        - |
          objectName: spring-kafka-bootstrap-servers
          objectType: secret
  secretObjects:
    - secretName: observability-kv-synced
      type: Opaque
      data:
        - objectName: db-username
          key: DB_USERNAME
        - objectName: db-password
          key: DB_PASSWORD
        - objectName: spring-kafka-bootstrap-servers
          key: SPRING_KAFKA_BOOTSTRAP_SERVERS
