apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-config-local
data:
  DB_URL: "jdbc:postgresql://host.docker.internal:5432/observability"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "host.docker.internal:9092"
  APP_AUDIT_DEFAULT_REGION_ID: "local-k8s"
---
apiVersion: v1
kind: Secret
metadata:
  name: observability-secrets-local
type: Opaque
stringData:
  DB_USERNAME: "observability"
  DB_PASSWORD: "observability"
