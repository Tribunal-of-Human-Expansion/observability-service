server:
  port: 8080

spring:
  application:
    name: observability-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:observability}
    username: ${DB_USER:observability}
    password: ${DB_PASSWORD:observability}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}}
    consumer:
      group-id: observability-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

app:
  audit:
    default-region-id: ${APP_AUDIT_DEFAULT_REGION_ID:local-dev}
    default-booking-source-service: ${APP_AUDIT_DEFAULT_BOOKING_SOURCE_SERVICE:booking-service}
  kafka:
    topics:
      booking-lifecycle: ${KAFKA_TOPIC_BOOKING_LIFECYCLE:booking-lifecycle}
      route-policy-updated: ${KAFKA_TOPIC_ROUTE_POLICY_UPDATED:route-policy-updated}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4319/v1/traces}
  metrics:
    tags:
      application: ${spring.application.name}
