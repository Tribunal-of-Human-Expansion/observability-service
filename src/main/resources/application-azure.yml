# ------------------------------------------------------------------------------
# Azure overlay — use with prod: SPRING_PROFILES_ACTIVE=prod,azure
#
# Azure Event Hubs (Kafka-compatible) usually requires SASL. Inject properties
# via environment, for example:
#   SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL=SASL_SSL
#   SPRING_KAFKA_PROPERTIES_SASL_MECHANISM=PLAIN
#   SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG=org.apache.kafka.common.security.plain.PlainLoginModule required username="$ConnectionString" password="...";
#
# Do not put connection strings or JAAS secrets in this file.
# ------------------------------------------------------------------------------

spring:
  application:
    name: observability-service

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_SERVERS}}
