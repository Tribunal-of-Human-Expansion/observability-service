app:
  audit:
    default-region-id: test-region
    default-booking-source-service: booking-service
  kafka:
    topics:
      booking-lifecycle: booking-lifecycle
      route-policy-updated: route-policy-updated

spring:
  datasource:
    url: jdbc:h2:mem:observability_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  kafka:
    consumer:
      group-id: observability-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
